name: misalud_flutter
description: Mi Salud FdA — MiniApp médica de Farmacias del Ahorro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación declarativa
  go_router: ^14.0.0

  # HTTP client
  http: ^1.2.0

  # Tipografías (Outfit + Manrope)
  google_fonts: ^6.2.1

  # Manejo de estado
  provider: ^6.1.2

  # QR codes en recetas
  qr_flutter: ^4.1.0

  # Imágenes con caché
  cached_network_image: ^3.3.1

  # Fechas en español
  intl: ^0.19.0

  # Firma digital
  flutter_signature_pad: ^3.0.0

  # Íconos de Material
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
